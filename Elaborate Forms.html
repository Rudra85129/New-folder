<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body bgcolor="Gold">
    <fieldset>
        <legend><h1>Registration Form of School</h1></legend>
    <form action="" >
        <Label>Enter your name:</Label>
        <input type="text"><br>
        <Label>Enter your Address:</Label>
        <input type="text"><br>
        <Label>Enter your email:</Label>
        <input type="email"><br>
        <Label>Enter your Password:</Label>
        <input type="password"><br>
        <Label>Enter your Contact number:</Label>
        <input type="tel"><br>
        <Label>Enter your Gender</Label><br>
        <input type="radio" name="gender" value="male">Male<br>
        <input type="radio" name="gender" value="female">Female<br>
        <input type="radio" name="gender" value="Others">Others<br><br>
         <Label><h3>Subjects</h3></Label>
        <label>Maths</label><input type="Checkbox" name="Subject" id="Maths"><br>
        <label>Science</label><input type="Checkbox" name="Subject" id="Science"><br>
        <label>English</label><input type="Checkbox" name="Subject" id="English"><br>
        <label>Computer</label><input type="Checkbox" name="Subject" id="Computer"><br>
        <label>Social Science</label><input type="Checkbox" name="Subject" id="Social Science"><br>
        <label>2nd Language</label><input type="Checkbox" name="Subject" id="2nd Language"><br>
        <br><br>
        <Label><h3>Sports</h3></Label>
        <Label>Cricket</Label><input type="Radio" name="Sports" id="Cricket"><br>
        <Label>Football</Label><input type="Radio" name="Sports" id="Football"><br>
        <Label>Volley Ball</Label><input type="Radio" name="Sports" id="Volley Ball"><br>
        <Label>Basket Ball</Label><input type="Radio" name="Sports" id="Basket Ball"><br><br><br>
         <Label><h4>City</h4></Label><Select name="City" id="City">
            <option value="Ayodhya">Ayodhya</option>
            <option value="Banglore">Banglore</option>
            <option value="Chennai">Chennai</option>
            <option value="Delhi">Delhi</option>
            <option value="Gangtok">Gangtok</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Indore">Indore</option>
            <option value="Jaipur">Jaipur</option>
            <option value="Kolkata">Kolkata</option> 
            <option value="Lucknow">Lucknow</option>
            <option value="Murshidabad">Murshidabad</option>
            <option value="Nagpur">Nagpur</option>
            <option value="Prayagraj">Prayagraj</option>
            <option value="Ranchi">ranchi</option>
            <option value="Surat">Surat</option>
            <option value="Thiruvananthapuram">Thiruvananthapuram</option>
            <option value="Udaipur">Udaipur</option>
            <option value="Varanasi">Varanasi</option>
        </Select><br><br>
        <br><br>
        <input type="Reset">
    </form>
    </fieldset>
</body>
</html>
