<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color:lawngreen;
    }
    #hello{
        width:200px;
        height:50px;
        background-color:red;
    }
</style>
<body>
    <div>
        <h1 style="color:blue;font-size: 50px">Text Effect</h1><br><br>
        <h2 id="hello">Text Decoration</h2><br><br>
        <h2 style="text-decoration:line-through wavy brown;">Line Through</h2><br><br>
        <h2 style="text-decoration:overline wavy orange;">Overline</h2><br><br>
        <h2 style="text-decoration:underline wavy purple;">Underline</h2><br><br>
        <h2 style="text-decoration:underline overline wavy pink;">Underline & Overline</h2><br><br>
         <h2 style="text-decoration:line-through underline wavy cyan;">Line Through & Underline</h2><br><br>
          <h2 style="text-decoration:line-through overline wavy yellow;">Line Through & Overline</h2><br><br>
           <h2 style="text-decoration:line-through overline underline wavy white;">Line Through & Underline & Overline</h2><br><br>
    </div>
</body>
</html>
