<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    input {
        background-color: red;
        color: rgb(0, 247, 255);
    }
    #Ram{
    background-color: black;
    width: 150px;
    height: 30px;
    }
    #Ram:hover{
        background-color: orange;
    }
    li:nth-child(2n){
        color: green;
    }
    li:nth-child(2n+1){
        color: orange
    }
    p::before{
        content: "All the Indians are saying";
    }
    p::after{
        content: "Jai Hind";
    }
</style>
<body>
    <input type="text"><br><br>
    <div id="Ram">Bharat mata ki Jai</div><br><br>
    <ol>
        <li>Sardar Vallabh Bhai Patel</li>
        <li>Bhagat Singh</li>
        <li>Sukhdev</li>
        <li>Rajguru</li>
        <li>Bal Gangadhar Tilak</li>
        <li>Subhas Chandra Bose</li>
        <li>Chandra Shekhar Azad</li>
        <li>Lala Lajpat Rai</li>
        <li>Mangal Pandey</li>
        <li>Rani laxmibai</li>
    </ol>
    <p> "Bharat Mata ki Jai".<br> </p>
</body>
</html>
