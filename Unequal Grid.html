<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Unequal Grid</h1>
    <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px;">
        <div style="background-color: lightblue; padding: 20px;">Column 1</div>
        <div style="background-color: lightcoral; padding: 20px;">Column 2 (twice as wide)</div>
        <div style="background-color: lightgreen; padding: 20px;">Column 3</div>
    </div>
</body>
</html>
