<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document
        Bootstrap Typography exmple
    </title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="Container">
        <h1>Heading Lists</h1>
        <h2 class="display-1">Codingal</h2>
        <h3 class="display-2">Codingal</h3>
        <h4 class="display-3">Codingal</h4>
    </div>
    <div class="Container-2">
        <h1>Lighter, Secondary Text with small tag and class text-muted<br>
        <small class="text-muted">Hello Codingal</small>
        </h1>
        <dl>
            <dt>Coffee</dt>
            <dt>White hot drink</dt>
        </dl>
    </div>
</body>
</html>
