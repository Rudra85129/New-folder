<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.first {
    background-color: red;
    font-size: 30px;
    opacity: 0.3;
    width: 200px;
    height: 100px;
    margin-bottom: 10px;
} 
.second {
    background-color: orange;
    font-size: 30px;
    opacity: 0.6;
    width: 200px;
    height: 100px;
    margin-bottom: 10px;
}
.third {
    background-color: lime;
    font-size: 30px;
    opacity: 1.0;
    width: 200px;
    height: 100px;
}
</style>
<body>
    <p style="font-size: 60px;">Opacity is a CSS property that controls the transparency of an element.</p>
    <div class="first">Opacity 0.3</div>
    <div class="second">Opacity 0.6</div>
    <div class="third">Opacity 1.0</div>
</body>
</html>
