<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #Rudra{
       border: 2px solid black;
       background-color: red;
       padding: 10px;
       margin: 10px;
    }
    #Patel{
        border: 3px solid black;
        background-color: blue;
        padding: 15px;
        margin: 20px;
    }
    #Master{
        border: 4px solid black;
        height: 100px;
        background-color: lime;
        padding: 20px;
        margin: 30px;
    }
    #Student{
        border: 2px solid black;
        height: 100px;
        background-color: yellow;
        padding: 25px;
        margin: 40px;
    }
    #Star{
        border: 2px solid black;
        height: 100px;
        background-color: Orange;
        padding: 30px;
        margin: 50px;
    }
</style>
<body>
    <div id="Rudra">
        I am a good Cricketer.
    </div>
    <div id="Patel">
        I am a good learner.
    </div>
    <div id="Master">
        I like to play music.
    </div>
    <div id="Student">
        I like to read books.
    </div>
    <div id="Star">
        I like to watch cricket matches.
    </div>
</body>
</html>
