<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
input {
    background-color: red;
    color: rgb(0, 255, 8);
}
#Hi{
    background-color: Black;
    width: 100px;
    height: 100px;
}
#Hi:hover{
    background-color:yellow;
}
li:nth-child(2n){
    color: blue;
}
p::before{
    content: "My Name is ";
}
p::after{
    content: " and I am a Web Developer";
}
p::first-letter{
    font-size: 50px;
}
</style>
<body>
    <input type="text"><br><br>
    <div id="Hi">Jai Shree Ram<br>Jai Bajrangbali<br>Jai Mahakal<br>Jai Mataji<br>Radhe Radhe</div><br>
    <ul>
        <li>Shree Ram</li>
        <li>Bajrangbali</li>
        <li>Har Har Mahadev</li>
        <li>Shree Krishna</li>
        <li>Jai Mataji</li>
        <li>Jai Brahma Dev</li>
        <li>Shree Ganesh</li>
        <li>Shree Kartikeya</li>
    </ul><br><br>
    <p>Rudra Patel</p><br><br>
</body>
</html>
